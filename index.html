<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Launcher</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3248; --text: #e8eaf6; --muted: #7b82a8;
      --accent: #6c7aff; --danger: #fc8181; --success: #68d391;
      --c0: #6c7aff; --c1: #4fd1c5; --c2: #f6ad55;
      --c3: #fc8181; --c4: #b794f4; --c5: #68d391;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: .75rem; }

    button { cursor: pointer; border: none; border-radius: 8px; font-size: .875rem; font-weight: 600; padding: .5rem 1rem; transition: opacity .15s, transform .1s; }
    button:hover { opacity: .88; } button:active { transform: scale(.97); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
    .btn-primary { background: var(--accent); color: #fff; }

    #status-banner { display: none; padding: .75rem 2rem; font-size: .85rem; font-weight: 500; }
    #status-banner.error   { background: rgba(252,129,129,.12); color: var(--danger); display: block; }
    #status-banner.loading { background: rgba(108,122,255,.08); color: var(--muted); display: block; }

    main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    #app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }

    .app-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.5rem; display: flex; flex-direction: column; gap: .75rem;
      text-decoration: none; color: inherit; position: relative; overflow: hidden;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .app-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, var(--accent)); }
    .app-card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
    .app-card.no-url { cursor: default; pointer-events: none; opacity: .6; }
    .card-emoji { font-size: 2rem; } .card-name { font-size: 1.05rem; font-weight: 700; }
    .card-desc { font-size: .82rem; color: var(--muted); line-height: 1.4; }
    .card-badge { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: .2rem .55rem; border-radius: 99px; background: rgba(255,255,255,.07); color: var(--muted); align-self: flex-start; margin-top: auto; }

    #admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 100; overflow-y: auto; padding: 2rem 1rem; }
    #admin-overlay.open { display: block; }
    #admin-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; max-width: 780px; margin: 0 auto; overflow: hidden; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); }
    .admin-body { padding: 1.5rem 1.75rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .config-url-row { display: flex; gap: .75rem; align-items: flex-start; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; font-size: .8rem; color: var(--muted); }
    .config-url-row strong { color: var(--text); white-space: nowrap; }
    .config-url-row span { word-break: break-all; }
    .app-rows { display: flex; flex-direction: column; gap: .75rem; }
    .app-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; display: grid; grid-template-columns: 2.5rem 1fr 1fr; gap: .75rem .5rem; align-items: start; }
    .app-row label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: .3rem; }
    .app-row input[type="text"], .app-row select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: .45rem .65rem; font-size: .85rem; outline: none; transition: border-color .15s; }
    .app-row input:focus, .app-row select:focus { border-color: var(--accent); }
    .app-row .emoji-input { font-size: 1.4rem; text-align: center; }
    .app-row .full-span { grid-column: 1 / -1; }
    .toggle-row { display: flex; align-items: center; gap: .6rem; font-size: .82rem; color: var(--muted); grid-column: 1 / -1; }
    .toggle { position: relative; display: inline-block; width: 38px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background .2s; }
    .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .admin-footer { padding: 1.25rem 1.75rem; border-top: 1px solid var(--border); display: flex; gap: .75rem; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .copy-hint { font-size: .78rem; color: var(--success); display: none; }
    .copy-hint.show { display: block; }
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 14px; height: 140px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @media (max-width: 600px) { header { padding: 1rem; } main { padding: 1rem; } .app-row { grid-template-columns: 2rem 1fr; } }
  </style>
</head>
<body>

<header>
  <h1>App <span>Launcher</span></h1>
  <div class="header-actions">
    <button class="btn-ghost" id="refresh-btn">↻ Refresh</button>
    <button class="btn-ghost" id="admin-btn">⚙ Admin</button>
  </div>
</header>

<div id="status-banner"></div>

<main>
  <div id="app-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</main>

<div id="admin-overlay">
  <div id="admin-panel">
    <div class="admin-header">
      <h2>⚙ Admin Panel</h2>
      <button class="btn-ghost" id="admin-close">✕ Close</button>
    </div>
    <div class="admin-body">
      <div class="config-url-row">
        <strong>Config URL:</strong>
        <span id="config-url-display"></span>
      </div>
      <div style="font-size:.8rem;color:var(--muted);line-height:1.6;">
        Edit your apps below, then click <strong style="color:var(--text)">Copy config.json</strong>.
        Paste into your GitHub repo's <code style="color:var(--accent)">config.json</code> and commit — all devices update on next load.
      </div>
      <div class="app-rows" id="admin-app-rows"></div>
    </div>
    <div class="admin-footer">
      <span class="copy-hint" id="copy-hint">✓ Copied to clipboard!</span>
      <button class="btn-ghost" id="admin-close2">Cancel</button>
      <button class="btn-primary" id="copy-btn">📋 Copy config.json</button>
    </div>
  </div>
</div>

<script>
  // ── SET YOUR GITHUB RAW URL HERE ─────────────────────────────────────────
const CONFIG_URL = 'https://raw.githubusercontent.com/jbbunno/palmcrest-hub/main/config.json';
  // ─────────────────────────────────────────────────────────────────────────

  const COLOR_OPTIONS = ['c0','c1','c2','c3','c4','c5'];
  const COLOR_LABELS  = { c0:'🔵 Blue', c1:'🟢 Teal', c2:'🟠 Orange', c3:'🔴 Red', c4:'🟣 Purple', c5:'💚 Green' };

  let apps = [];

  const grid         = document.getElementById('app-grid');
  const banner       = document.getElementById('status-banner');
  const adminOverlay = document.getElementById('admin-overlay');
  const adminRows    = document.getElementById('admin-app-rows');
  const copyBtn      = document.getElementById('copy-btn');
  const copyHint     = document.getElementById('copy-hint');

  async function loadConfig() {
    setBanner('loading', '⏳ Loading config from GitHub…');
    grid.innerHTML = '<div class="skeleton"></div>'.repeat(3);
    try {
      const res = await fetch(CONFIG_URL + '?cb=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      apps = await res.json();
      clearBanner();
      renderGrid();
    } catch (err) {
      setBanner('error', '⚠ Could not load config: ' + err.message + '. Check CONFIG_URL at the top of this file.');
      grid.innerHTML = '';
    }
  }

  function renderGrid() {
    grid.innerHTML = '';
    const visible = apps.filter(a => a.enabled !== false);
    if (!visible.length) { grid.innerHTML = '<p style="color:var(--muted)">No apps enabled.</p>'; return; }
    visible.forEach(app => {
      const hasUrl = app.url && app.url.trim();
      const el = document.createElement(hasUrl ? 'a' : 'div');
      if (hasUrl) { el.href = app.url; el.target = '_blank'; el.rel = 'noopener'; }
      el.className = 'app-card' + (hasUrl ? '' : ' no-url');
      el.style.setProperty('--card-color', 'var(--' + (app.color || 'c0') + ')');
      el.innerHTML =
        '<div class="card-emoji">' + esc(app.emoji||'📦') + '</div>' +
        '<div class="card-name">'  + esc(app.name||'')   + '</div>' +
        '<div class="card-desc">'  + esc(app.desc||'')   + '</div>' +
        (!hasUrl ? '<span class="card-badge">Coming soon</span>' : '');
      grid.appendChild(el);
    });
  }

  function openAdmin() {
    document.getElementById('config-url-display').textContent = CONFIG_URL;
    adminRows.innerHTML = '';
    apps.forEach((app, i) => {
      const row = document.createElement('div');
      row.className = 'app-row'; row.dataset.index = i;
      row.innerHTML =
        '<div><label>Icon</label><input type="text" class="emoji-input" data-field="emoji" value="' + esc(app.emoji||'') + '" maxlength="4"/></div>' +
        '<div><label>Name</label><input type="text" data-field="name" value="' + esc(app.name||'') + '" placeholder="App name"/></div>' +
        '<div><label>Color</label><select data-field="color">' + COLOR_OPTIONS.map(c => '<option value="'+c+'"'+(app.color===c?' selected':'')+'>'+COLOR_LABELS[c]+'</option>').join('') + '</select></div>' +
        '<div class="full-span"><label>Description</label><input type="text" data-field="desc" value="' + esc(app.desc||'') + '" placeholder="Short description"/></div>' +
        '<div class="full-span"><label>URL</label><input type="text" data-field="url" value="' + esc(app.url||'') + '" placeholder="https://…"/></div>' +
        '<div class="toggle-row"><label class="toggle"><input type="checkbox" data-field="enabled"'+(app.enabled!==false?' checked':'')+'/><span class="slider"></span></label><span>Enabled</span></div>';
      adminRows.appendChild(row);
    });
    adminOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeAdmin() {
    adminOverlay.classList.remove('open');
    document.body.style.overflow = '';
    copyHint.classList.remove('show');
  }

  function readForm() {
    return Array.from(adminRows.querySelectorAll('.app-row')).map(row => {
      const i = +row.dataset.index, g = f => row.querySelector('[data-field="'+f+'"]');
      return { id: apps[i].id, name: g('name').value.trim(), desc: g('desc').value.trim(),
               url: g('url').value.trim(), emoji: g('emoji').value.trim(),
               color: g('color').value, enabled: g('enabled').checked };
    });
  }

  copyBtn.addEventListener('click', async () => {
    const json = JSON.stringify(readForm(), null, 2);
    try { await navigator.clipboard.writeText(json); }
    catch {
      const ta = Object.assign(document.createElement('textarea'), { value: json });
      Object.assign(ta.style, { position:'fixed', opacity:'0' });
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    copyHint.classList.add('show');
    setTimeout(() => copyHint.classList.remove('show'), 3000);
  });

  function setBanner(type, msg) { banner.className = type; banner.textContent = msg; }
  function clearBanner() { banner.className = ''; banner.textContent = ''; banner.style.display = 'none'; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('admin-btn').addEventListener('click', openAdmin);
  document.getElementById('admin-close').addEventListener('click', closeAdmin);
  document.getElementById('admin-close2').addEventListener('click', closeAdmin);
  document.getElementById('refresh-btn').addEventListener('click', loadConfig);
  adminOverlay.addEventListener('click', e => { if (e.target === adminOverlay) closeAdmin(); });

  loadConfig();
</script>
</body>
</html>
